<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trafix - Violation Details</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 40px;
    }

    .card {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      color: #1f2937;
      text-align: center;
    }

    .row {
      margin: 12px 0;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
    }

    strong {
      color: #111827;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Violation Details</h1>

    <div class="row"><strong>Violation ID:</strong> V-1024</div>
    <div class="row"><strong>Type:</strong> Speeding</div>
    <div class="row"><strong>Date:</strong> 2026-05-10</div>
    <div class="row"><strong>Location:</strong> Damascus - Main Road</div>
    <div class="row"><strong>Fine Amount:</strong> 50 USD</div>
    <div class="row"><strong>Status:</strong> Unpaid</div>
    <div class="row"><strong>Description:</strong> Vehicle exceeded the allowed speed limit.</div>
  </div>

</body>
</html>
